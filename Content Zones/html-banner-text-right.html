<style>
.clp-banner {
    position: relative;
    width: 100%;
    height: 215px;
    background-image: url('https://dam.generac.com/ImConvServlet/imconv/5cf70f99a57a0e64d08370eca30aa4e4bfb779e8/original');
    background-size: cover;
    background-position: center;
    overflow: hidden;
}

/* Gradient goes RIGHT → LEFT */
.clp-banner::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 80%;
    height: 100%;
    background: linear-gradient(to left, rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0));
    z-index: 1;
}

/* Move text to the RIGHT and align right */
.clp-banner-text {
    position: absolute;
    top: 50%;
    right: 5%;
    transform: translateY(-50%);
    text-align: right;
    color: white;
    z-index: 2;
}

.clp-banner-text h1 {
    font-size: 4rem;
    font-weight: bold;
    margin: 0;
    line-height: 0.9;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
    text-transform: uppercase;
}

.clp-banner-text h2 {
    font-size: 1.6rem;
    margin: 0 !important;
    text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
    color: #fff;
    font-weight: 900;
    padding: 0 !important;
    line-height: 1.3em !important;
    text-transform: uppercase;
}

@media (max-width: 767px) {
    .clp-banner {
        display: none;
    }
}
</style>

<div class="clp-banner">
    <div class="clp-banner-text">
        <h1>Split Logs on<br>Your Table Top</h1>
        <h2>With an Electric DR Log Splitter</h2>
    </div>
</div>
